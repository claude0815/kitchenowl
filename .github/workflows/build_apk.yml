name: Build Android APK
on:
  workflow_dispatch:
    inputs:
      split_per_abi:
        description: "Build separate APKs per CPU architecture (smaller files)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clone Flutter repository with stable channel
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --no-analytics

      - name: Checkout code
        uses: actions/checkout@v4
      - run: flutter packages get
        working-directory: kitchenowl

      # The release build requires a signing config (see android/app/build.gradle).
      # Generate a throwaway keystore so the build succeeds without Play Store
      # secrets — the resulting APK is sideloadable but not upgrade-compatible
      # with Play Store releases (different signing key).
      - name: Generate ad-hoc keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/sideload-keystore.jks \
            -storepass sideload -keypass sideload \
            -alias sideload -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=KitchenOwl Sideload,O=KitchenOwl,C=US"
          {
            echo "storeFile=sideload-keystore.jks"
            echo "keyAlias=sideload"
            echo "storePassword=sideload"
            echo "keyPassword=sideload"
          } > key.properties
        working-directory: kitchenowl/android

      - name: Build APK
        run: |
          if [[ "$SPLIT" == "true" ]]; then
            flutter build apk --release --split-per-abi
          else
            flutter build apk --release
          fi
        env:
          SPLIT: ${{ github.event.inputs.split_per_abi }}
        working-directory: kitchenowl

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchenowl-apk-${{ github.sha }}
          path: kitchenowl/build/app/outputs/flutter-apk/*.apk
          retention-days: 14
